# tmpfiles.d entries for directories in /var that are not covered by any
# installed package's tmpfiles.d. These are created on first boot and across
# upgrades by systemd-tmpfiles, satisfying the bootc var-tmpfiles lint check.

# containers sigstore (from containers-common / podman)
d /var/lib/containers 0755 root root - -
d /var/lib/containers/sigstore 0775 root root - -

# tpm2-tss (from tpm2-tss package)
d /var/lib/tpm2-tss 0755 root root - -
d /var/lib/tpm2-tss/system 0755 root root - -

# samba (from samba package)
d /var/lib/samba/drivers 0775 root root - -

# /usr/local bind-mount compatibility layer (bazzite base image)
d /var/usrlocal 0755 root root - -
d /var/usrlocal/etc 0755 root root - -
d /var/usrlocal/games 0755 root root - -
d /var/usrlocal/include 0755 root root - -
d /var/usrlocal/lib 0755 root root - -
d /var/usrlocal/sbin 0755 root root - -
d /var/usrlocal/share 0755 root root - -
d /var/usrlocal/src 0755 root root - -
